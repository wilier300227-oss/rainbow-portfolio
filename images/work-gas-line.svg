<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="'Noto Sans JP', 'Hiragino Kaku Gothic Pro', sans-serif">
  <!-- Background -->
  <rect width="900" height="280" fill="#faf6f0"/>
  <!-- Dot grid -->
  <pattern id="d" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="0.7" fill="rgba(45,42,38,0.06)"/>
  </pattern>
  <rect width="900" height="280" fill="url(#d)"/>

  <!-- ===== STEP 1: Google Form ===== -->
  <g transform="translate(30,30)">
    <!-- card -->
    <rect width="220" height="180" rx="12" fill="white" stroke="#e8e0d5" stroke-width="1.5"/>
    <!-- form header bar -->
    <rect width="220" height="36" rx="12" fill="#c2703d"/>
    <rect y="24" width="220" height="12" fill="#c2703d"/>
    <text x="110" y="22" text-anchor="middle" fill="white" font-size="12" font-weight="bold">お問い合わせフォーム</text>
    <!-- accent line -->
    <rect x="0" y="36" width="6" height="144" rx="3" fill="#c2703d"/>
    <!-- form fields -->
    <text x="24" y="62" fill="#6f655a" font-size="10">お名前</text>
    <rect x="24" y="68" width="174" height="16" rx="4" fill="#f3ece1"/>
    <text x="24" y="98" fill="#6f655a" font-size="10">メールアドレス</text>
    <rect x="24" y="104" width="174" height="16" rx="4" fill="#f3ece1"/>
    <text x="24" y="134" fill="#6f655a" font-size="10">お問い合わせ内容</text>
    <rect x="24" y="140" width="174" height="32" rx="4" fill="#f3ece1"/>
    <!-- submit button -->
    <rect x="64" y="152" width="94" height="20" rx="6" fill="#c2703d"/>
    <text x="111" y="166" text-anchor="middle" fill="white" font-size="11" font-weight="bold">送信する</text>
  </g>
  <!-- label -->
  <text x="140" y="232" text-anchor="middle" fill="#6f655a" font-size="13">① フォーム送信</text>

  <!-- ===== ARROW 1 ===== -->
  <g transform="translate(258,108)">
    <line x1="0" y1="32" x2="60" y2="32" stroke="#c2703d" stroke-width="2.5"/>
    <polygon points="57,25 72,32 57,39" fill="#c2703d"/>
    <text x="36" y="20" text-anchor="middle" fill="#c2703d" font-size="11" font-weight="bold">GAS</text>
    <text x="36" y="55" text-anchor="middle" fill="#6f655a" font-size="10">自動実行</text>
  </g>

  <!-- ===== STEP 2: Spreadsheet ===== -->
  <g transform="translate(338,30)">
    <rect width="230" height="180" rx="12" fill="white" stroke="#e8e0d5" stroke-width="1.5"/>
    <!-- header -->
    <rect width="230" height="36" rx="12" fill="#188038"/>
    <rect y="24" width="230" height="12" fill="#188038"/>
    <text x="115" y="22" text-anchor="middle" fill="white" font-size="12" font-weight="bold">スプレッドシート</text>
    <!-- col headers -->
    <rect y="36" width="230" height="22" fill="#e8f5e9"/>
    <text x="52" y="52" text-anchor="middle" fill="#2d5016" font-size="10" font-weight="bold">日時</text>
    <text x="110" y="52" text-anchor="middle" fill="#2d5016" font-size="10" font-weight="bold">お名前</text>
    <text x="185" y="52" text-anchor="middle" fill="#2d5016" font-size="10" font-weight="bold">内容</text>
    <!-- row 1 -->
    <line x1="0" y1="72" x2="230" y2="72" stroke="#e8e0d5" stroke-width="0.8"/>
    <text x="52" y="69" text-anchor="middle" fill="#6f655a" font-size="10">10:23</text>
    <text x="110" y="69" text-anchor="middle" fill="#6f655a" font-size="10">田中様</text>
    <text x="185" y="69" text-anchor="middle" fill="#6f655a" font-size="10">ご依頼について</text>
    <!-- row 2 -->
    <line x1="0" y1="90" x2="230" y2="90" stroke="#e8e0d5" stroke-width="0.8"/>
    <text x="52" y="87" text-anchor="middle" fill="#6f655a" font-size="10">11:05</text>
    <text x="110" y="87" text-anchor="middle" fill="#6f655a" font-size="10">山田様</text>
    <text x="185" y="87" text-anchor="middle" fill="#6f655a" font-size="10">料金を知りたい</text>
    <!-- row 3 NEW highlight -->
    <rect y="91" width="230" height="22" fill="#fff8e6"/>
    <line x1="0" y1="113" x2="230" y2="113" stroke="#e8e0d5" stroke-width="0.8"/>
    <text x="52" y="108" text-anchor="middle" fill="#c2703d" font-size="10" font-weight="bold">14:52</text>
    <text x="110" y="108" text-anchor="middle" fill="#c2703d" font-size="10" font-weight="bold">鈴木様</text>
    <text x="178" y="108" text-anchor="middle" fill="#c2703d" font-size="10" font-weight="bold">見積希望</text>
    <rect x="206" y="97" width="20" height="12" rx="3" fill="#c2703d"/>
    <text x="216" y="107" text-anchor="middle" fill="white" font-size="8" font-weight="bold">NEW</text>
  </g>
  <!-- label -->
  <text x="453" y="232" text-anchor="middle" fill="#6f655a" font-size="13">② スプレッドシートに記録</text>

  <!-- ===== ARROW 2 ===== -->
  <g transform="translate(576,108)">
    <line x1="0" y1="32" x2="60" y2="32" stroke="#c2703d" stroke-width="2.5"/>
    <polygon points="57,25 72,32 57,39" fill="#c2703d"/>
    <text x="36" y="20" text-anchor="middle" fill="#c2703d" font-size="11" font-weight="bold">即時</text>
    <text x="36" y="55" text-anchor="middle" fill="#6f655a" font-size="10">通知</text>
  </g>

  <!-- ===== STEP 3: LINE ===== -->
  <!-- phone frame -->
  <g transform="translate(652,18)">
    <rect width="206" height="228" rx="20" fill="#1a1a1a"/>
    <rect x="5" y="8" width="196" height="212" rx="16" fill="#e8e0d5"/>
    <!-- LINE header -->
    <rect x="5" y="8" width="196" height="36" rx="16" fill="#06C755"/>
    <rect x="5" y="28" width="196" height="16" fill="#06C755"/>
    <!-- LINE icon circle -->
    <circle cx="24" cy="26" r="12" fill="white"/>
    <text x="24" y="31" text-anchor="middle" fill="#06C755" font-size="14" font-weight="bold">L</text>
    <text x="110" y="31" text-anchor="middle" fill="white" font-size="11" font-weight="bold">通知BOT</text>
    <!-- chat area -->
    <!-- bubble 1 (older, gray) -->
    <rect x="14" y="56" width="150" height="44" rx="10" fill="white"/>
    <polygon points="14,65 4,70 14,75" fill="white"/>
    <text x="24" y="71" fill="#2d2a26" font-size="9" font-weight="bold">📩 フォーム受信</text>
    <text x="24" y="84" fill="#6f655a" font-size="9">山田様「料金を知りたい」</text>
    <text x="152" y="108" fill="#aaa" font-size="8">11:05</text>
    <!-- bubble 2 (new, highlighted) -->
    <rect x="14" y="115" width="168" height="60" rx="10" fill="white" stroke="#c2703d" stroke-width="1.5"/>
    <polygon points="14,124 4,130 14,136" fill="white"/>
    <rect x="14" y="115" width="168" height="16" rx="10" fill="#fff3ec"/>
    <rect x="14" y="123" width="168" height="8" fill="#fff3ec"/>
    <text x="24" y="128" fill="#c2703d" font-size="9" font-weight="bold">🔔 新着フォーム！</text>
    <text x="24" y="144" fill="#2d2a26" font-size="9">鈴木様よりお問い合わせ</text>
    <text x="24" y="158" fill="#6f655a" font-size="9">「見積もり希望」14:52</text>
    <text x="170" y="183" fill="#aaa" font-size="8">14:52</text>
  </g>
  <!-- label -->
  <text x="755" y="262" text-anchor="middle" fill="#6f655a" font-size="13">③ LINE に届く</text>
</svg>
